<!DOCTYPE html>
<html lang="pt-ao">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Cardápio Digital Online | TASSA D´CAMASSA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { background: linear-gradient(145deg, #fefaf5 0%, #fff5e8 100%); color:#1e1e2a; }
        .container { max-width:1400px; margin:0 auto; padding:2rem 1.5rem; }
        .card { background:rgba(255,255,255,0.9); backdrop-filter:blur(4px); border-radius:36px; padding:1.8rem; margin-bottom:2rem; box-shadow:0 15px 35px -12px rgba(0,0,0,0.1); }
        h2 { font-size:1.8rem; margin-bottom:1.5rem; background:linear-gradient(135deg,#c47b2e,#a05e1f); background-clip:text; -webkit-background-clip:text; color:transparent; border-left:6px solid #c47b2e; padding-left:1rem; }
        button { background:linear-gradient(135deg,#c47b2e,#a05e1f); color:white; border:none; padding:0.7rem 1.6rem; border-radius:40px; font-weight:600; cursor:pointer; transition:0.2s; }
        button:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(196,123,46,0.3); }
        .btn-outline { background:white; border:1.5px solid #c47b2e; color:#c47b2e; box-shadow:none; }
        input, textarea, select { padding:0.8rem 1rem; border:1px solid #e2e8f0; border-radius:28px; width:100%; font-size:0.95rem; }
        .restaurant-header { text-align:center; margin-bottom:2rem; }
        .logo-img { width:100px; height:100px; object-fit:contain; border-radius:50%; background:white; box-shadow:0 10px 20px rgba(0,0,0,0.1); padding:8px; }
        .contact-info { display:flex; justify-content:center; gap:1.5rem; flex-wrap:wrap; margin-top:1rem; background:rgba(255,255,245,0.7); padding:0.5rem 1.5rem; border-radius:60px; width:fit-content; margin:0 auto; }
        .dishes-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:1.8rem; margin-top:1.5rem; }
        .dish-card { background:white; border-radius:32px; overflow:hidden; cursor:pointer; transition:0.25s; box-shadow:0 10px 20px rgba(0,0,0,0.05); }
        .dish-card:hover { transform:translateY(-8px); box-shadow:0 20px 30px -12px rgba(0,0,0,0.15); }
        .dish-img-container { height:180px; background:#f5efe9; display:flex; align-items:center; justify-content:center; overflow:hidden; }
        .dish-img-container img { max-width:100%; max-height:100%; object-fit:contain; }
        .price { font-weight:800; font-size:1.3rem; color:#c47b2e; margin:0.5rem 0; }
        .cart-floating { position:fixed; bottom:25px; right:25px; background:linear-gradient(135deg,#c47b2e,#a05e1f); width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-size:1.8rem; cursor:pointer; z-index:200; box-shadow:0 10px 20px rgba(0,0,0,0.2); }
        .cart-count { background:#ffc107; color:#1f2937; border-radius:30px; font-size:0.8rem; font-weight:bold; position:absolute; top:-5px; right:-5px; padding:0.2rem 0.5rem; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); backdrop-filter:blur(8px); justify-content:center; align-items:center; z-index:1000; }
        .modal-content { background:white; max-width:550px; width:90%; border-radius:48px; padding:2rem; max-height:85vh; overflow-y:auto; }
        .carousel-box { background:rgba(255,250,240,0.8); border-radius:40px; padding:1rem; margin-bottom:1.5rem; }
        .carousel { position:relative; display:flex; align-items:center; }
        .carousel-inner { overflow:hidden; width:100%; border-radius:28px; background:#e6dbcf; }
        .carousel-slide { display:flex; transition:transform 0.4s ease; }
        .carousel-item { min-width:100%; padding:0.5rem; text-align:center; }
        .carousel-img { width:100%; height:260px; object-fit:contain; background:#f8f2ea; border-radius:24px; }
        .carousel-btn { background:#c47b2e; width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; position:absolute; top:50%; transform:translateY(-50%); cursor:pointer; z-index:2; color:white; }
        .carousel-btn-left { left:8px; }
        .carousel-btn-right { right:8px; }
        .admin-item { display:flex; justify-content:space-between; align-items:center; background:#fef9f0; padding:0.8rem 1.2rem; border-radius:32px; margin-bottom:0.8rem; flex-wrap:wrap; gap:1rem; }
        .status-badge { padding:0.2rem 0.8rem; border-radius:40px; font-size:0.7rem; font-weight:bold; display:inline-block; }
        .status-pending { background:#fef3c7; color:#b45309; }
        .status-completed { background:#dcfce7; color:#15803d; }
        .status-cancelled { background:#fee2e2; color:#b91c1c; }
        .btn-sm { padding:0.3rem 0.8rem; font-size:0.75rem; margin:0 0.2rem; }
        .toast { position:fixed; bottom:100px; right:20px; background:#1f2937; color:white; padding:0.6rem 1.2rem; border-radius:60px; z-index:300; font-size:0.9rem; }
        .go-top { position:fixed; bottom:100px; right:25px; background:#c47b2e; width:48px; height:48px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; cursor:pointer; opacity:0; transition:0.2s; pointer-events:none; z-index:99; }
        .go-top.show { opacity:1; pointer-events:auto; }
        @media (max-width:700px){ .container{ padding:1rem; } .carousel-img{ height:180px; } }
    </style>
</head>
<body>

<div id="customerView" class="container">
    <div class="restaurant-header" id="restaurantHeader"></div>
    <div class="search-bar" style="display:flex; justify-content:center; margin-bottom:1.5rem;">
        <input type="text" id="searchInput" placeholder="🔍 Buscar prato ou bebida...">
    </div>
    <div class="carousel-box">
        <h3 style="text-align:center;"><i class="fas fa-star"></i> Pratos em Destaque</h3>
        <div class="carousel" id="featuredCarousel">
            <div class="carousel-btn carousel-btn-left" id="featuredPrev"><i class="fas fa-chevron-left"></i></div>
            <div class="carousel-inner"><div class="carousel-slide" id="featuredSlide"></div></div>
            <div class="carousel-btn carousel-btn-right" id="featuredNext"><i class="fas fa-chevron-right"></i></div>
        </div>
    </div>
    <div class="carousel-box">
        <h3 style="text-align:center;"><i class="fas fa-camera"></i> Freezer da Semana</h3>
        <div class="carousel" id="freezerCarousel">
            <div class="carousel-btn carousel-btn-left" id="freezerPrev"><i class="fas fa-chevron-left"></i></div>
            <div class="carousel-inner"><div class="carousel-slide" id="freezerSlide"></div></div>
            <div class="carousel-btn carousel-btn-right" id="freezerNext"><i class="fas fa-chevron-right"></i></div>
        </div>
    </div>
    <div><h2><i class="fas fa-utensils"></i> Comidas</h2><div id="foodsGrid" class="dishes-grid"></div></div>
    <div><h2><i class="fas fa-mug-hot"></i> Bebidas</h2><div id="drinksGrid" class="dishes-grid"></div></div>
</div>

<div id="adminView" style="display: none;">
    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
            <h2>Painel Administrativo</h2>
            <button id="adminLogout">Sair</button>
        </div>
        <!-- Empresa -->
        <div class="card">
            <h2>🏪 Empresa</h2>
            <input id="compName" placeholder="Nome do Restaurante">
            <input type="file" id="logoUpload" accept="image/*">
            <img id="logoPreview" width="80" style="border-radius:40px; margin:10px 0;">
            <input id="compAddress" placeholder="Endereço">
            <input id="compEmail" placeholder="E-mail">
            <input id="compWhatsapp" placeholder="WhatsApp (com código do país)">
            <button id="saveCompanyBtn">Salvar Empresa</button>
        </div>
        <!-- Cardápio -->
        <div class="card">
            <h2>🍽️ Cardápio</h2>
            <button id="newDishBtn">+ Novo Item</button>
            <div id="dishForm" style="display:none; background:#fef3e4; padding:1rem; border-radius:32px; margin-top:1rem;">
                <h3 id="dishFormTitle">Novo Item</h3>
                <input id="dishName" placeholder="Nome">
                <textarea id="dishDesc" placeholder="Descrição" rows="2"></textarea>
                <input id="dishPrice" placeholder="Preço (Kz)">
                <select id="dishCategory"><option value="comida">Comida</option><option value="bebida">Bebida</option></select>
                <input type="file" id="dishImage" accept="image/*">
                <label><input type="checkbox" id="dishFeatured"> Destaque</label>
                <div style="margin-top:1rem;"><button id="saveDishBtn">Salvar</button><button id="cancelDishBtn" class="btn-outline">Cancelar</button></div>
            </div>
            <div id="dishesAdminList"></div>
        </div>
        <!-- Freezer -->
        <div class="card">
            <h2>📸 Freezer da Semana</h2>
            <input type="file" id="freezerUpload" accept="image/*">
            <button id="addFreezerBtn">Adicionar Foto</button>
            <div id="freezerAdminList"></div>
        </div>
        <!-- Pedidos -->
        <div class="card">
            <h2>📦 Pedidos Recebidos</h2>
            <div style="display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:1rem;">
                <input id="orderSearchName" placeholder="Nome do cliente">
                <input type="date" id="orderStartDate">
                <input type="date" id="orderEndDate">
                <button id="filterOrdersBtn">Filtrar</button>
                <button id="clearOrdersFilter" class="btn-outline">Limpar</button>
            </div>
            <div id="ordersList"></div>
        </div>
        <!-- Estatísticas -->
        <div class="card">
            <h2>📊 Estatísticas</h2>
            <div style="display:flex; gap:1rem; flex-wrap:wrap; margin-bottom:1rem;">
                <input type="date" id="statsStart">
                <input type="date" id="statsEnd">
                <button id="applyStatsBtn">Filtrar</button>
            </div>
            <canvas id="ordersChart" height="180" style="max-height:250px;"></canvas>
            <div id="statsSummary" class="card" style="margin-top:1rem;"></div>
            <h3>🥇 Itens mais pedidos</h3>
            <canvas id="topItemsChart" height="180"></canvas>
        </div>
        <!-- Utilizadores -->
        <div class="card">
            <h2>👥 Utilizadores</h2>
            <button id="registerUserBtn">+ Registrar Novo Utilizador</button>
            <div id="usersList"></div>
        </div>
        <!-- Backup (exportar/importar dados como JSON) -->
        <div class="card">
            <h2>💾 Backup Manual</h2>
            <button id="exportDataBtn">Exportar Dados (JSON)</button>
            <button id="importDataBtn" class="btn-outline">Importar Dados</button>
            <input type="file" id="importFile" style="display:none;">
            <button id="resetDataBtn" style="background:#dc2626; margin-left:1rem;">Restaurar Padrão</button>
        </div>
    </div>
</div>

<div id="cartModal" class="modal">
    <div class="modal-content">
        <h3>🛒 Seu Carrinho</h3>
        <div id="cartItemsList"></div>
        <div id="cartTotal" style="font-weight:bold; margin:1rem 0;"></div>
        <input id="customerName" placeholder="Seu nome *">
        <input id="customerAddress" placeholder="Endereço para entrega">
        <textarea id="orderNote" placeholder="Observações (ex: ponto de referência)" rows="2"></textarea>
        <div style="display:flex; gap:1rem; margin-top:1rem;">
            <button id="sendOrderBtn">📱 Enviar Pedido via WhatsApp</button>
            <button id="closeCartBtn" class="btn-outline">Fechar</button>
        </div>
    </div>
</div>

<div id="detailModal" class="modal">
    <div class="modal-content" id="detailContent"></div>
</div>

<div id="userRegisterModal" class="modal">
    <div class="modal-content">
        <h3>Registar Novo Utilizador</h3>
        <input id="regName" placeholder="Nome completo">
        <input type="password" id="regPass" placeholder="Senha">
        <input type="file" id="regPhoto" accept="image/*">
        <button id="confirmRegBtn">Registar</button>
        <button id="cancelRegBtn" class="btn-outline">Cancelar</button>
    </div>
</div>

<div class="cart-floating" id="cartFloat">
    <i class="fas fa-shopping-cart"></i>
    <span class="cart-count" id="cartCount">0</span>
</div>
<div class="go-top" id="goTop"><i class="fas fa-arrow-up"></i></div>

<script>
    // ==================== CONFIGURAÇÃO SUPABASE ====================
    const SUPABASE_URL = 'https://ivdqczmvcxeaqdojmwtw.supabase.co';      // SUBSTITUA
    const SUPABASE_ANON_KEY = 'sb_publishable_o_7CF32ImdS0GZDzCpmuVA_D-7E0JfT';                   // SUBSTITUA
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const STORAGE_BUCKET = 'restaurant-images';

    // ==================== ESTADO GLOBAL ====================
    let currentUser = null;        // { id, name, role }
    let cart = [];
    let editingDishId = null;
    let featuredInterval, freezerInterval;
    let ordersChart, topItemsChart;

    // ==================== UTILITÁRIOS ====================
    function formatKz(v) { return v.toLocaleString('pt-AO', {minimumFractionDigits: 2}) + " Kz"; }
    function parsePrice(s) { let n = parseFloat(s.replace(/\./g, '').replace(',', '.')); return isNaN(n) ? 0 : n; }
    function showToast(msg) { let t = document.createElement('div'); t.className = 'toast'; t.innerText = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2500); }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]); }

    // Upload de imagem para o Storage do Supabase e retorna a URL pública
    async function uploadImage(file, folder) {
        if (!file) return null;
        const ext = file.name.split('.').pop();
        const fileName = `${Date.now()}.${ext}`;
        const filePath = `${folder}/${fileName}`;
        const { data, error } = await supabase.storage.from(STORAGE_BUCKET).upload(filePath, file);
        if (error) { console.error(error); return null; }
        const { data: { publicUrl } } = supabase.storage.from(STORAGE_BUCKET).getPublicUrl(filePath);
        return publicUrl;
    }

    // ==================== CARRINHO ====================
    function updateCartUI() {
        const totalItems = cart.reduce((s, i) => s + i.qty, 0);
        document.getElementById('cartCount').innerText = totalItems;
    }
    function addToCart(dish) {
        const existing = cart.find(i => i.id === dish.id);
        if (existing) existing.qty++;
        else cart.push({ ...dish, qty: 1 });
        updateCartUI();
        showToast(`${dish.name} adicionado ao carrinho`);
    }
    function renderCartModal() {
        const container = document.getElementById('cartItemsList');
        if (cart.length === 0) { container.innerHTML = '<p>Carrinho vazio</p>'; document.getElementById('cartTotal').innerHTML = ''; return; }
        let html = '', total = 0;
        cart.forEach((item, idx) => {
            const sub = item.price * item.qty;
            total += sub;
            html += `<div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                        <span><strong>${escapeHtml(item.name)}</strong> x${item.qty}</span>
                        <span>${formatKz(sub)}</span>
                        <div>
                            <button class="cart-dec" data-idx="${idx}">-</button>
                            <button class="cart-remove" data-idx="${idx}">x</button>
                        </div>
                     </div>`;
        });
        container.innerHTML = html;
        document.getElementById('cartTotal').innerHTML = `<strong>Total: ${formatKz(total)}</strong>`;
        document.querySelectorAll('.cart-dec').forEach(btn => btn.addEventListener('click', () => {
            const idx = parseInt(btn.dataset.idx);
            if (cart[idx].qty > 1) cart[idx].qty--;
            else cart.splice(idx, 1);
            updateCartUI();
            renderCartModal();
        }));
        document.querySelectorAll('.cart-remove').forEach(btn => btn.addEventListener('click', () => {
            cart.splice(parseInt(btn.dataset.idx), 1);
            updateCartUI();
            renderCartModal();
        }));
    }

    // ==================== FUNÇÕES DE BANCO (CRUD) ====================
    async function loadCompany() {
        const { data, error } = await supabase.from('company').select('*').eq('id', 1).single();
        if (error) return null;
        return data;
    }
    async function saveCompany(companyData, logoFile) {
        let logoUrl = companyData.logo_url;
        if (logoFile) {
            const url = await uploadImage(logoFile, 'logos');
            if (url) logoUrl = url;
        }
        const { error } = await supabase.from('company').upsert({ id: 1, ...companyData, logo_url: logoUrl });
        if (error) throw error;
        showToast('Empresa atualizada');
        await renderCustomer();
    }
    async function loadDishes() {
        const { data, error } = await supabase.from('dishes').select('*');
        if (error) return [];
        return data;
    }
    async function saveDish(dish, imageFile) {
        let imageUrl = dish.image_url;
        if (imageFile) {
            const url = await uploadImage(imageFile, 'dishes');
            if (url) imageUrl = url;
        }
        const dishData = { ...dish, image_url: imageUrl };
        if (dishData.id) {
            const { error } = await supabase.from('dishes').update(dishData).eq('id', dishData.id);
            if (error) throw error;
        } else {
            dishData.id = Date.now().toString();
            const { error } = await supabase.from('dishes').insert(dishData);
            if (error) throw error;
        }
        showToast('Prato salvo');
        await renderCustomer();
        if (document.getElementById('adminView').style.display === 'block') renderAdmin();
    }
    async function deleteDish(id) {
        const { error } = await supabase.from('dishes').delete().eq('id', id);
        if (error) throw error;
        showToast('Item removido');
        await renderCustomer();
        if (document.getElementById('adminView').style.display === 'block') renderAdmin();
    }
    async function loadFreezer() {
        const { data, error } = await supabase.from('freezer').select('*');
        if (error) return [];
        return data;
    }
    async function addFreezerPhoto(imageFile, caption = '') {
        const imageUrl = await uploadImage(imageFile, 'freezer');
        if (!imageUrl) return;
        const newItem = { id: Date.now().toString(), image_url: imageUrl, caption };
        const { error } = await supabase.from('freezer').insert(newItem);
        if (error) throw error;
        showToast('Foto adicionada ao freezer');
        await renderCustomer();
        if (document.getElementById('adminView').style.display === 'block') renderAdmin();
    }
    async function deleteFreezer(id) {
        const { error } = await supabase.from('freezer').delete().eq('id', id);
        if (error) throw error;
        showToast('Foto removida');
        await renderCustomer();
        if (document.getElementById('adminView').style.display === 'block') renderAdmin();
    }
    async function loadUsers() {
        const { data, error } = await supabase.from('users').select('*');
        if (error) return [];
        return data;
    }
    async function registerUser(name, password, photoFile) {
        let photoUrl = '';
        if (photoFile) {
            const url = await uploadImage(photoFile, 'users');
            if (url) photoUrl = url;
        }
        const newUser = { id: Date.now().toString(), name, password, photo_url: photoUrl, role: 'user' };
        const { error } = await supabase.from('users').insert(newUser);
        if (error) throw error;
        showToast('Utilizador registado');
        if (document.getElementById('adminView').style.display === 'block') renderAdmin();
    }
    async function deleteUser(id) {
        const { error } = await supabase.from('users').delete().eq('id', id);
        if (error) throw error;
        showToast('Utilizador removido');
        if (document.getElementById('adminView').style.display === 'block') renderAdmin();
    }
    async function loadOrders() {
        const { data, error } = await supabase.from('orders').select('*');
        if (error) return [];
        return data;
    }
    async function updateOrderStatus(id, status) {
        const { error } = await supabase.from('orders').update({ status }).eq('id', id);
        if (error) throw error;
        showToast(`Pedido ${status === 'completed' ? 'concluído' : status === 'cancelled' ? 'cancelado' : 'reaberto'}`);
        if (document.getElementById('adminView').style.display === 'block') renderAdmin();
    }
    async function createOrder(orderData) {
        const { error } = await supabase.from('orders').insert(orderData);
        if (error) throw error;
    }

    // ==================== RENDER CLIENTE (PÚBLICO) ====================
    async function renderCustomer() {
        const company = await loadCompany();
        const dishes = await loadDishes();
        const freezer = await loadFreezer();
        // Header
        const headerDiv = document.getElementById('restaurantHeader');
        headerDiv.innerHTML = `
            <div>${company.logo_url ? `<img src="${company.logo_url}" class="logo-img">` : '<div class="logo-img" style="background:#e5e7eb; display:flex; align-items:center; justify-content:center;"><i class="fas fa-utensils" style="font-size:2.5rem; color:#c47b2e;"></i></div>'}</div>
            <h1>${escapeHtml(company.name)}</h1>
            <div class="contact-info">
                <span><i class="fas fa-map-marker-alt"></i> ${escapeHtml(company.address)}</span>
                <span><i class="fas fa-envelope"></i> ${escapeHtml(company.email)}</span>
                <span><i class="fab fa-whatsapp"></i> <a href="https://wa.me/${company.whatsapp.replace(/\D/g,'')}" target="_blank">Pedir via WhatsApp</a></span>
            </div>
        `;
        // Busca
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const comidas = dishes.filter(d => d.category === 'comida' && (d.name.toLowerCase().includes(searchTerm) || d.description.toLowerCase().includes(searchTerm)));
        const bebidas = dishes.filter(d => d.category === 'bebida' && (d.name.toLowerCase().includes(searchTerm) || d.description.toLowerCase().includes(searchTerm)));
        // Grids
        document.getElementById('foodsGrid').innerHTML = comidas.map(d => `
            <div class="dish-card" data-id="${d.id}">
                <div class="dish-img-container"><img src="${d.image_url || 'https://placehold.co/400x300?text=Prato'}" onerror="this.src='https://placehold.co/400x300'"></div>
                <div style="padding:1rem;"><h3>${escapeHtml(d.name)}</h3><p>${escapeHtml(d.description?.substring(0,70) || '')}</p><div class="price">${formatKz(d.price)}</div><button class="add-cart-btn" data-id="${d.id}">Pedir</button><button class="detail-btn" data-id="${d.id}">Detalhes</button></div>
            </div>`).join('');
        document.getElementById('drinksGrid').innerHTML = bebidas.map(d => `
            <div class="dish-card" data-id="${d.id}">
                <div class="dish-img-container"><img src="${d.image_url || 'https://placehold.co/400x300?text=Bebida'}" onerror="this.src='https://placehold.co/400x300'"></div>
                <div style="padding:1rem;"><h3>${escapeHtml(d.name)}</h3><div class="price">${formatKz(d.price)}</div><button class="add-cart-btn" data-id="${d.id}">Pedir</button><button class="detail-btn" data-id="${d.id}">Detalhes</button></div>
            </div>`).join('');
        // Eventos dos botões
        document.querySelectorAll('.add-cart-btn').forEach(btn => btn.addEventListener('click', async (e) => {
            e.stopPropagation();
            const id = btn.dataset.id;
            const dish = dishes.find(d => d.id === id);
            if (dish) addToCart(dish);
        }));
        document.querySelectorAll('.detail-btn').forEach(btn => btn.addEventListener('click', async (e) => {
            e.stopPropagation();
            const id = btn.dataset.id;
            const dish = dishes.find(d => d.id === id);
            if (dish) {
                document.getElementById('detailContent').innerHTML = `
                    <h3>${escapeHtml(dish.name)}</h3>
                    <img src="${dish.image_url || 'https://placehold.co/400x300'}" style="width:100%; max-height:250px; object-fit:contain;">
                    <p>${escapeHtml(dish.description || '')}</p>
                    <div class="price">${formatKz(dish.price)}</div>
                    <button id="detailAddCartBtn">Adicionar ao carrinho</button>
                    <button class="btn-outline" id="closeDetailBtn">Fechar</button>
                `;
                document.getElementById('detailModal').style.display = 'flex';
                document.getElementById('detailAddCartBtn').onclick = () => { addToCart(dish); document.getElementById('detailModal').style.display = 'none'; };
                document.getElementById('closeDetailBtn').onclick = () => document.getElementById('detailModal').style.display = 'none';
            }
        }));
        // Carrosséis
        const featuredDishes = dishes.filter(d => d.featured);
        renderCarousel('featuredSlide', featuredDishes.map(d => ({ image: d.image_url })), 'featuredPrev', 'featuredNext', (interval) => { if (featuredInterval) clearInterval(featuredInterval); featuredInterval = interval; });
        renderCarousel('freezerSlide', freezer.map(f => ({ image: f.image_url })), 'freezerPrev', 'freezerNext', (interval) => { if (freezerInterval) clearInterval(freezerInterval); freezerInterval = interval; });
    }
    function renderCarousel(slideId, items, prevId, nextId, setIntervalFn) {
        const slide = document.getElementById(slideId);
        if (!slide) return;
        if (!items.length) { slide.innerHTML = `<div class="carousel-item"><div class="carousel-img" style="background:#ddd; display:flex; align-items:center; justify-content:center;">Sem conteúdo</div></div>`; return; }
        slide.innerHTML = items.map(item => `<div class="carousel-item"><img class="carousel-img" src="${item.image || 'https://placehold.co/600x400?text=Sem+Imagem'}" onerror="this.src='https://placehold.co/600x400'"></div>`).join('');
        let index = 0, total = items.length;
        function updateTransform() { slide.style.transform = `translateX(-${index * 100}%)`; }
        updateTransform();
        const prevBtn = document.getElementById(prevId), nextBtn = document.getElementById(nextId);
        if (prevBtn) prevBtn.onclick = () => { index = (index - 1 + total) % total; updateTransform(); if (setIntervalFn) setIntervalFn(null); autoStart(); };
        if (nextBtn) nextBtn.onclick = () => { index = (index + 1) % total; updateTransform(); if (setIntervalFn) setIntervalFn(null); autoStart(); };
        let autoTimer;
        function autoStart() { if (autoTimer) clearInterval(autoTimer); if (total > 1) autoTimer = setInterval(() => { index = (index + 1) % total; updateTransform(); }, 5000); if (setIntervalFn) setIntervalFn(autoTimer); }
        autoStart();
    }

    // ==================== RENDER ADMIN ====================
    async function renderAdmin() {
        const company = await loadCompany();
        document.getElementById('compName').value = company.name || '';
        document.getElementById('compAddress').value = company.address || '';
        document.getElementById('compEmail').value = company.email || '';
        document.getElementById('compWhatsapp').value = company.whatsapp || '';
        if (company.logo_url) document.getElementById('logoPreview').src = company.logo_url;
        const dishes = await loadDishes();
        const dishesHtml = dishes.map(d => `
            <div class="admin-item">
                <div><img src="${d.image_url || 'https://placehold.co/50x50'}" width="50" style="border-radius:16px;"> <strong>${escapeHtml(d.name)}</strong> ${formatKz(d.price)} (${d.category})</div>
                <div><button class="edit-dish" data-id="${d.id}">Editar</button><button class="delete-dish" data-id="${d.id}">Excluir</button><label><input type="checkbox" class="featured-chk" data-id="${d.id}" ${d.featured ? 'checked' : ''}> Destaque</label></div>
            </div>`).join('');
        document.getElementById('dishesAdminList').innerHTML = dishesHtml || '<p>Nenhum prato cadastrado.</p>';
        const freezer = await loadFreezer();
        document.getElementById('freezerAdminList').innerHTML = freezer.map(f => `
            <div class="admin-item">
                <img src="${f.image_url}" width="60" style="border-radius:16px;">
                <button class="del-freezer" data-id="${f.id}">Remover</button>
            </div>`).join('');
        const users = await loadUsers();
        document.getElementById('usersList').innerHTML = users.map(u => `
            <div class="admin-item"><span>${escapeHtml(u.name)} (${u.role})</span><button class="del-user" data-id="${u.id}">Remover</button></div>`).join('');
        // Eventos admin
        document.querySelectorAll('.edit-dish').forEach(btn => btn.addEventListener('click', async () => {
            const dishesList = await loadDishes();
            const dish = dishesList.find(d => d.id === btn.dataset.id);
            if (dish) {
                editingDishId = dish.id;
                document.getElementById('dishName').value = dish.name;
                document.getElementById('dishDesc').value = dish.description || '';
                document.getElementById('dishPrice').value = dish.price;
                document.getElementById('dishCategory').value = dish.category;
                document.getElementById('dishFeatured').checked = dish.featured;
                document.getElementById('dishForm').style.display = 'block';
                document.getElementById('dishFormTitle').innerText = 'Editar Item';
            }
        }));
        document.querySelectorAll('.delete-dish').forEach(btn => btn.addEventListener('click', async () => {
            if (confirm('Remover este item?')) await deleteDish(btn.dataset.id);
        }));
        document.querySelectorAll('.featured-chk').forEach(chk => chk.addEventListener('change', async () => {
            const dishesList = await loadDishes();
            const dish = dishesList.find(d => d.id === chk.dataset.id);
            if (dish) {
                dish.featured = chk.checked;
                await saveDish(dish, null);
            }
        }));
        document.querySelectorAll('.del-freezer').forEach(btn => btn.addEventListener('click', async () => {
            if (confirm('Remover esta foto?')) await deleteFreezer(btn.dataset.id);
        }));
        document.querySelectorAll('.del-user').forEach(btn => btn.addEventListener('click', async () => {
            if (confirm('Remover este utilizador?')) await deleteUser(btn.dataset.id);
        }));
        await renderOrdersList();
        await updateStats();
    }
    async function renderOrdersList() {
        let orders = await loadOrders();
        const search = document.getElementById('orderSearchName').value.toLowerCase();
        const start = document.getElementById('orderStartDate').value;
        const end = document.getElementById('orderEndDate').value;
        let filtered = orders.filter(o => {
            if (search && !o.customer_name.toLowerCase().includes(search)) return false;
            if (start && o.date.split('T')[0] < start) return false;
            if (end && o.date.split('T')[0] > end) return false;
            return true;
        });
        const html = filtered.map(o => `
            <div class="admin-item">
                <div><strong>${escapeHtml(o.customer_name)}</strong> - ${new Date(o.date).toLocaleString()} - Total: ${formatKz(o.total)}<br><span class="status-badge status-${o.status}">${o.status === 'pending' ? 'Pendente' : o.status === 'completed' ? 'Concluído' : 'Cancelado'}</span></div>
                <div>${o.status === 'pending' ? `<button class="complete-order" data-id="${o.id}">✅ Concluir</button> <button class="cancel-order" data-id="${o.id}">❌ Cancelar</button>` : `<button class="revert-order" data-id="${o.id}">🔄 Reabrir</button>`}</div>
            </div>`).join('');
        document.getElementById('ordersList').innerHTML = html || '<p>Nenhum pedido encontrado.</p>';
        document.querySelectorAll('.complete-order').forEach(btn => btn.addEventListener('click', () => updateOrderStatus(btn.dataset.id, 'completed')));
        document.querySelectorAll('.cancel-order').forEach(btn => btn.addEventListener('click', () => updateOrderStatus(btn.dataset.id, 'cancelled')));
        document.querySelectorAll('.revert-order').forEach(btn => btn.addEventListener('click', () => updateOrderStatus(btn.dataset.id, 'pending')));
    }
    async function updateStats() {
        const start = document.getElementById('statsStart').value;
        const end = document.getElementById('statsEnd').value;
        let orders = await loadOrders();
        let filtered = orders.filter(o => {
            if (start && o.date.split('T')[0] < start) return false;
            if (end && o.date.split('T')[0] > end) return false;
            return true;
        });
        const completed = filtered.filter(o => o.status === 'completed');
        const revenue = completed.reduce((s, o) => s + o.total, 0);
        document.getElementById('statsSummary').innerHTML = `<div><strong>Período:</strong> ${filtered.length} pedidos | Concluídos: ${completed.length} | Receita: ${formatKz(revenue)}</div>`;
        const daily = {};
        filtered.forEach(o => { const day = o.date.split('T')[0]; daily[day] = (daily[day] || 0) + 1; });
        const labels = Object.keys(daily).sort();
        const data = labels.map(l => daily[l]);
        if (ordersChart) ordersChart.destroy();
        const ctx = document.getElementById('ordersChart').getContext('2d');
        ordersChart = new Chart(ctx, { type: 'line', data: { labels, datasets: [{ label: 'Pedidos por dia', data, borderColor: '#c47b2e', fill: false }] } });
        const itemCount = {};
        filtered.forEach(o => { o.items.forEach(i => { itemCount[i.name] = (itemCount[i.name] || 0) + i.qty; }); });
        const top = Object.entries(itemCount).sort((a, b) => b[1] - a[1]).slice(0, 5);
        if (topItemsChart) topItemsChart.destroy();
        const ctxTop = document.getElementById('topItemsChart').getContext('2d');
        topItemsChart = new Chart(ctxTop, { type: 'bar', data: { labels: top.map(t => t[0]), datasets: [{ label: 'Quantidade pedida', data: top.map(t => t[1]), backgroundColor: '#f59e0b' }] } });
    }

    // ==================== ENVIO DE PEDIDO ====================
    async function submitOrder() {
        if (cart.length === 0) return alert('Carrinho vazio');
        const customerName = document.getElementById('customerName').value.trim();
        if (!customerName) return alert('Digite seu nome');
        const address = document.getElementById('customerAddress').value;
        const note = document.getElementById('orderNote').value;
        const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        const items = cart.map(i => ({ name: i.name, qty: i.qty, price: i.price }));
        const order = {
            id: Date.now().toString(),
            date: new Date().toISOString(),
            customer_name: customerName,
            address,
            note,
            items,
            total,
            status: 'pending'
        };
        await createOrder(order);
        const company = await loadCompany();
        const msg = `*NOVO PEDIDO*\nCliente: ${customerName}\nEndereço: ${address || '---'}\nItens:\n${items.map(i => `${i.name} x${i.qty}`).join('\n')}\nTotal: ${formatKz(total)}\nObs: ${note}`;
        const phone = company.whatsapp.replace(/\D/g, '');
        if (phone) window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
        showToast('Pedido enviado com sucesso!');
        cart = [];
        updateCartUI();
        document.getElementById('cartModal').style.display = 'none';
        if (document.getElementById('adminView').style.display === 'block') await renderOrdersList();
    }

    // ==================== LOGIN ADMIN ====================
    async function loginAdmin() {
        const pwd = prompt('Senha do Administrador:');
        if (!pwd) return;
        const { data, error } = await supabase.from('users').select('*').eq('password', pwd).eq('role', 'admin').single();
        if (data) {
            currentUser = data;
            document.getElementById('customerView').style.display = 'none';
            document.getElementById('adminView').style.display = 'block';
            renderAdmin();
        } else {
            alert('Senha incorreta');
        }
    }
    function logoutAdmin() {
        currentUser = null;
        document.getElementById('adminView').style.display = 'none';
        document.getElementById('customerView').style.display = 'block';
        renderCustomer();
    }

    // ==================== INICIALIZAÇÃO ====================
    window.addEventListener('DOMContentLoaded', async () => {
        await renderCustomer();
        document.getElementById('searchInput').addEventListener('input', renderCustomer);
        document.getElementById('cartFloat').addEventListener('click', () => { renderCartModal(); document.getElementById('cartModal').style.display = 'flex'; });
        document.getElementById('closeCartBtn').addEventListener('click', () => document.getElementById('cartModal').style.display = 'none');
        document.getElementById('sendOrderBtn').addEventListener('click', submitOrder);
        // Botão Admin flutuante
        const adminBtn = document.createElement('div');
        adminBtn.style.cssText = 'position:fixed; bottom:20px; left:20px; background:#2d2d3a; color:white; border-radius:40px; padding:8px 16px; cursor:pointer; z-index:99;';
        adminBtn.innerHTML = '<i class="fas fa-lock"></i> Admin';
        adminBtn.onclick = loginAdmin;
        document.body.appendChild(adminBtn);
        document.getElementById('adminLogout').addEventListener('click', logoutAdmin);
        // Eventos do painel admin
        document.getElementById('saveCompanyBtn').addEventListener('click', async () => {
            const company = await loadCompany();
            const newCompany = { ...company, name: document.getElementById('compName').value, address: document.getElementById('compAddress').value, email: document.getElementById('compEmail').value, whatsapp: document.getElementById('compWhatsapp').value };
            const logoFile = document.getElementById('logoUpload').files[0];
            await saveCompany(newCompany, logoFile);
            document.getElementById('logoUpload').value = '';
        });
        document.getElementById('newDishBtn').addEventListener('click', () => {
            editingDishId = null;
            document.getElementById('dishName').value = '';
            document.getElementById('dishDesc').value = '';
            document.getElementById('dishPrice').value = '';
            document.getElementById('dishCategory').value = 'comida';
            document.getElementById('dishFeatured').checked = false;
            document.getElementById('dishForm').style.display = 'block';
            document.getElementById('dishFormTitle').innerText = 'Novo Item';
        });
        document.getElementById('saveDishBtn').addEventListener('click', async () => {
            const name = document.getElementById('dishName').value.trim();
            if (!name) return alert('Nome do item é obrigatório');
            const price = parsePrice(document.getElementById('dishPrice').value);
            if (price <= 0) return alert('Preço inválido');
            const dish = {
                id: editingDishId,
                name,
                description: document.getElementById('dishDesc').value,
                price,
                category: document.getElementById('dishCategory').value,
                featured: document.getElementById('dishFeatured').checked,
                image_url: ''
            };
            const imageFile = document.getElementById('dishImage').files[0];
            await saveDish(dish, imageFile);
            document.getElementById('dishForm').style.display = 'none';
            document.getElementById('dishImage').value = '';
        });
        document.getElementById('cancelDishBtn').addEventListener('click', () => document.getElementById('dishForm').style.display = 'none');
        document.getElementById('addFreezerBtn').addEventListener('click', async () => {
            const file = document.getElementById('freezerUpload').files[0];
            if (!file) return alert('Selecione uma imagem');
            await addFreezerPhoto(file);
            document.getElementById('freezerUpload').value = '';
        });
        document.getElementById('filterOrdersBtn').addEventListener('click', renderOrdersList);
        document.getElementById('clearOrdersFilter').addEventListener('click', () => {
            document.getElementById('orderSearchName').value = '';
            document.getElementById('orderStartDate').value = '';
            document.getElementById('orderEndDate').value = '';
            renderOrdersList();
        });
        document.getElementById('applyStatsBtn').addEventListener('click', updateStats);
        document.getElementById('registerUserBtn').addEventListener('click', () => document.getElementById('userRegisterModal').style.display = 'flex');
        document.getElementById('confirmRegBtn').addEventListener('click', async () => {
            const name = document.getElementById('regName').value.trim();
            const pass = document.getElementById('regPass').value.trim();
            if (!name || !pass) return alert('Nome e senha obrigatórios');
            const photoFile = document.getElementById('regPhoto').files[0];
            await registerUser(name, pass, photoFile);
            document.getElementById('userRegisterModal').style.display = 'none';
            document.getElementById('regName').value = '';
            document.getElementById('regPass').value = '';
            document.getElementById('regPhoto').value = '';
        });
        document.getElementById('cancelRegBtn').addEventListener('click', () => document.getElementById('userRegisterModal').style.display = 'none');
        document.getElementById('exportDataBtn').addEventListener('click', async () => {
            const company = await loadCompany();
            const dishes = await loadDishes();
            const freezer = await loadFreezer();
            const users = await loadUsers();
            const orders = await loadOrders();
            const data = { company, dishes, freezer, users, orders };
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([JSON.stringify(data)]));
            a.download = `backup_${Date.now()}.json`;
            a.click();
        });
        document.getElementById('importDataBtn').addEventListener('click', () => document.getElementById('importFile').click());
        document.getElementById('importFile').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const data = JSON.parse(ev.target.result);
                if (data.company) await supabase.from('company').upsert(data.company);
                if (data.dishes) for (let d of data.dishes) await supabase.from('dishes').upsert(d);
                if (data.freezer) for (let f of data.freezer) await supabase.from('freezer').upsert(f);
                if (data.users) for (let u of data.users) await supabase.from('users').upsert(u);
                if (data.orders) for (let o of data.orders) await supabase.from('orders').upsert(o);
                showToast('Dados importados com sucesso!');
                await renderCustomer();
                if (document.getElementById('adminView').style.display === 'block') renderAdmin();
            };
            reader.readAsText(file);
        });
        document.getElementById('resetDataBtn').addEventListener('click', async () => {
            if (confirm('ATENÇÃO: Isso vai apagar todos os dados e restaurar o padrão. Confirmar?')) {
                // Executar SQL de reset (opcional, pode recriar manualmente)
                showToast('Use a função de importar com um backup ou recrie manualmente');
            }
        });
        // Botão voltar ao topo
        const goTop = document.getElementById('goTop');
        window.addEventListener('scroll', () => { if (window.scrollY > 300) goTop.classList.add('show'); else goTop.classList.remove('show'); });
        goTop.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
    });
</script>
