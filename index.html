<!DOCTYPE html>
<html lang="pt-ao">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Cardápio Digital</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
        body { background:#f5ede4; padding:20px; }
        .admin-btn { position:fixed; bottom:20px; left:20px; background:#333; color:white; padding:10px 16px; border-radius:30px; cursor:pointer; z-index:999; }
        .cart-btn { position:fixed; bottom:20px; right:20px; background:#c47b2e; color:white; padding:10px 16px; border-radius:30px; cursor:pointer; }
        .container { max-width:1200px; margin:0 auto; background:white; padding:20px; border-radius:20px; }
        .dish-card { border:1px solid #ddd; border-radius:12px; padding:10px; margin:10px; display:inline-block; width:200px; vertical-align:top; }
        .price { color:#c47b2e; font-weight:bold; }
        button { background:#c47b2e; color:white; border:none; padding:6px 12px; border-radius:20px; cursor:pointer; }
    </style>
</head>
<body>
<div class="container" id="customerView">
    <h1 id="restaurantName">Carregando...</h1>
    <div id="dishesList"></div>
</div>

<div id="adminPanel" style="display:none;">
    <div class="container">
        <h2>Painel Admin</h2>
        <button id="logoutAdmin">Sair</button>
        <hr>
        <h3>Empresa</h3>
        <input id="compName" placeholder="Nome"><br>
        <input id="compWhatsapp" placeholder="WhatsApp"><br>
        <button id="saveCompany">Salvar</button>
        <hr>
        <h3>Novo Prato</h3>
        <input id="dishName" placeholder="Nome">
        <input id="dishPrice" placeholder="Preço">
        <select id="dishCategory"><option>comida</option><option>bebida</option></select>
        <button id="addDish">Adicionar</button>
        <div id="adminDishesList"></div>
    </div>
</div>

<div class="admin-btn" id="adminLoginBtn">Admin</div>
<div class="cart-btn" id="cartBtn">Carrinho (<span id="cartCount">0</span>)</div>

<script>
    // CONFIGURAÇÃO
    const SUPABASE_URL = 'https://ivdqczmvcxeaqdojmwtw.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_o_7CF32ImdS0GZDzCpmuVA_D-7E0JfT';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let cart = [];

    // Helper
    function showMsg(msg) { alert(msg); }

    // Carregar dados
    async function loadCompany() {
        const { data } = await supabase.from('company').select('*').eq('id',1).single();
        return data;
    }
    async function loadDishes() {
        const { data } = await supabase.from('dishes').select('*');
        return data || [];
    }
    async function renderCustomer() {
        const company = await loadCompany();
        document.getElementById('restaurantName').innerText = company?.name || 'Meu Restaurante';
        const dishes = await loadDishes();
        const html = dishes.map(d => `
            <div class="dish-card">
                <h3>${d.name}</h3>
                <div class="price">${d.price} Kz</div>
                <button onclick="addToCart('${d.id}','${d.name}',${d.price})">Pedir</button>
            </div>
        `).join('');
        document.getElementById('dishesList').innerHTML = html;
        updateCartUI();
    }

    window.addToCart = function(id, name, price) {
        let item = cart.find(i => i.id === id);
        if(item) item.qty++;
        else cart.push({ id, name, price, qty:1 });
        updateCartUI();
        showMsg(`${name} adicionado`);
    };
    function updateCartUI() {
        let total = cart.reduce((s,i)=>s+i.qty,0);
        document.getElementById('cartCount').innerText = total;
    }

    // Admin
    async function loginAdmin() {
        let pwd = prompt('Senha admin:');
        if(pwd === 'admin123') {
            currentUser = { role:'admin' };
            document.getElementById('customerView').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            await renderAdmin();
        } else alert('Senha errada');
    }
    async function renderAdmin() {
        const company = await loadCompany();
        document.getElementById('compName').value = company?.name || '';
        document.getElementById('compWhatsapp').value = company?.whatsapp || '';
        const dishes = await loadDishes();
        document.getElementById('adminDishesList').innerHTML = dishes.map(d => `
            <div>${d.name} - ${d.price} Kz <button onclick="deleteDish('${d.id}')">Excluir</button></div>
        `).join('');
    }
    window.deleteDish = async (id) => {
        await supabase.from('dishes').delete().eq('id',id);
        await renderAdmin();
        await renderCustomer();
    };
    document.getElementById('addDish').onclick = async () => {
        const name = document.getElementById('dishName').value;
        const price = parseFloat(document.getElementById('dishPrice').value);
        const category = document.getElementById('dishCategory').value;
        if(!name || isNaN(price)) return showMsg('Preencha corretamente');
        const newDish = { id: Date.now().toString(), name, price, category, description:'', featured:false };
        await supabase.from('dishes').insert(newDish);
        await renderAdmin();
        await renderCustomer();
        document.getElementById('dishName').value = '';
        document.getElementById('dishPrice').value = '';
    };
    document.getElementById('saveCompany').onclick = async () => {
        const name = document.getElementById('compName').value;
        const whatsapp = document.getElementById('compWhatsapp').value;
        await supabase.from('company').upsert({ id:1, name, whatsapp });
        await renderCustomer();
        showMsg('Empresa salva');
    };
    document.getElementById('logoutAdmin').onclick = () => {
        currentUser = null;
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('customerView').style.display = 'block';
        renderCustomer();
    };
    document.getElementById('adminLoginBtn').onclick = loginAdmin;
    document.getElementById('cartBtn').onclick = () => {
        if(cart.length===0) return showMsg('Carrinho vazio');
        let msg = cart.map(i=>`${i.name} x${i.qty} = ${i.price*i.qty} Kz`).join('\n');
        let total = cart.reduce((s,i)=>s+(i.price*i.qty),0);
        alert(`Pedido:\n${msg}\nTotal: ${total} Kz\nEnvie pelo WhatsApp.`);
    };

    renderCustomer();
</script>
</body>
</html>
